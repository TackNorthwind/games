<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO BOMBERMAN</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #0a0a14 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,78,80,0.3);
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-panel {
            display: flex;
            justify-content: space-around;
            width: 720px;
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 10px;
            border-radius: 16px 16px 0 0;
            box-sizing: border-box;
            border: 2px solid #3b82f6;
            border-bottom: none;
            box-shadow: 0 -10px 25px rgba(59, 130, 246, 0.15);
        }

        .ui-item {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #94a3b8;
        }

        .ui-value {
            color: #3b82f6;
            margin-left: 6px;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
        }

        canvas {
            border: 4px solid #3b82f6;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(59, 130, 246, 0.2);
            background: #0f172a;
        }

        #controls {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.8;
            background: rgba(15, 23, 42, 0.6);
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid #1e293b;
        }

        kbd {
            background: #334155;
            color: #f8fafc;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            box-shadow: 0 2px 0 #0f172a;
            margin: 0 2px;
        }
    </style>
</head>
<body>

    <h1>NEO BOMBERMAN</h1>

    <div id="game-container">
        <div id="ui-panel">
            <div class="ui-item">Stage:<span id="stage-ui" class="ui-value">1</span></div>
            <div class="ui-item">Score:<span id="score" class="ui-value">0</span></div>
            <div class="ui-item">Bomb:<span id="bombs-ui" class="ui-value">1/1</span></div>
            <div class="ui-item">Fire:<span id="fire-ui" class="ui-value">2</span></div>
            <div class="ui-item">Speed:<span id="speed-ui" class="ui-value">1</span></div>
        </div>
        <canvas id="gameCanvas" width="720" height="624"></canvas>
        <div id="controls">
            【移動】: <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> / <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> &nbsp;&nbsp;|&nbsp;&nbsp; 
            【爆弾】: <kbd>Space</kbd> &nbsp;&nbsp;|&nbsp;&nbsp; 
            【サウンド】: オン(自動) / <kbd>M</kbd>でミュート
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE_SIZE = 48;
const COLS = 15;
const ROWS = 13;
const PLAYER_SIZE = 34;

let map = [];
let player = {};
let bombs =[];
let explosions =[];
let items = [];
let enemies =[];
let hatch = { r: -1, c: -1, revealed: false };
let hiddenItems =[]; 

let score = 0;
let stage = 1;
let gameState = 'playing';
let keys = {};
let lastTime = 0;
const fpsInterval = 1000 / 60;

// --- サウンドシステム ---
let audioCtx;
let bgmActive = true;
let bgmInterval;
let noteIdx = 0;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function toggleBGM() {
    bgmActive = !bgmActive;
}

function startBGM() {
    if (bgmInterval) return;
    const bass =[130.81, 130.81, 196.00, 196.00, 146.83, 146.83, 196.00, 196.00]; 
    bgmInterval = setInterval(() => {
        if (gameState === 'playing' && bgmActive && audioCtx) {
            playTone(bass[noteIdx % bass.length], 'triangle', 0.15, 0.02);
            noteIdx++;
        }
    }, 250);
}

function playTone(freq, type, duration, vol=0.1) {
    if (!audioCtx || !bgmActive) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, vol) {
    if (!audioCtx || !bgmActive) return;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start();
}

function playSE(type) {
    if (!audioCtx || !bgmActive) return;
    if (type === 'bomb') playTone(440, 'sine', 0.1, 0.1);
    if (type === 'explode') playNoise(0.4, 0.3);
    if (type === 'item') {
        playTone(880, 'square', 0.1, 0.05);
        setTimeout(() => playTone(1760, 'square', 0.1, 0.05), 100);
    }
    if (type === 'enemy') playTone(150, 'sawtooth', 0.2, 0.1);
    if (type === 'dead') {
        playTone(300, 'sawtooth', 0.3, 0.2);
        setTimeout(() => playTone(200, 'sawtooth', 0.5, 0.2), 150);
    }
    if (type === 'clear') {[523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
            setTimeout(() => playTone(f, 'square', 0.2, 0.1), i * 150);
        });
    }
}

// --- ゲーム初期化 ---
function initGame(resetAll = true) {
    if (resetAll) {
        score = 0;
        stage = 1;
        player = { size: PLAYER_SIZE, speed: 2.5, bombsMax: 1, range: 2, speedLevel: 1, alive: true };
    }

    player.x = TILE_SIZE + (TILE_SIZE - PLAYER_SIZE) / 2;
    player.y = TILE_SIZE + (TILE_SIZE - PLAYER_SIZE) / 2;
    player.size = PLAYER_SIZE; 
    player.alive = true;

    map =[];
    let softBlocks =[];

    for (let r = 0; r < ROWS; r++) {
        map[r] =[];
        for (let c = 0; c < COLS; c++) {
            if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
                map[r][c] = 1;
            } else if (r % 2 === 0 && c % 2 === 0) {
                map[r][c] = 1;
            } else {
                if ((r <= 2 && c <= 2)) {
                    map[r][c] = 0;
                } else {
                    if (Math.random() < 0.4) {
                        map[r][c] = 2;
                        softBlocks.push({r, c});
                    } else {
                        map[r][c] = 0;
                    }
                }
            }
        }
    }

    hiddenItems =[];
    if (softBlocks.length > 0) {
        softBlocks.sort(() => Math.random() - 0.5);

        let h = softBlocks.pop();
        if (h) hatch = { r: h.r, c: h.c, revealed: false };

        let s = softBlocks.pop();
        if (s) hiddenItems.push({ r: s.r, c: s.c, type: 'speed' });

        let b = softBlocks.pop();
        if (b) hiddenItems.push({ r: b.r, c: b.c, type: 'bomb' });

        let f = softBlocks.pop();
        if (f) hiddenItems.push({ r: f.r, c: f.c, type: 'fire' });
    }

    bombs =[];
    explosions =[];
    items =[];
    gameState = 'playing';

    spawnEnemies();
}

function spawnEnemies() {
    enemies =[];
    const baseCount = 3 + Math.floor(stage / 2);
    
    let emptyCells =[];
    for (let r = 3; r < ROWS - 1; r++) {
        for (let c = 3; c < COLS - 1; c++) {
            if (map[r][c] === 0) emptyCells.push({r, c});
        }
    }
    emptyCells.sort(() => Math.random() - 0.5);

    for (let i = 0; i < Math.min(baseCount, emptyCells.length); i++) {
        let cell = emptyCells[i];
        let type = Math.floor(Math.random() * 3);
        let speedMult = 1 + (stage * 0.05);

        let color, speed;
        if (type === 0) { color = '#f87171'; speed = 1.2 * speedMult; }
        else if (type === 1) { color = '#60a5fa'; speed = 1.8 * speedMult; }
        else { color = '#fbbf24'; speed = 0.8 * speedMult; }

        enemies.push({
            x: cell.c * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE) / 2,
            y: cell.r * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE) / 2,
            size: PLAYER_SIZE,
            speed: speed,
            color: color,
            dir: Math.floor(Math.random() * 4),
            changeDirTimer: Math.floor(Math.random() * 60) + 30
        });
    }
}

window.addEventListener('keydown', e => {
    initAudio();
    startBGM();

    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ' && gameState === 'playing') placeBomb();
    if (e.key.toLowerCase() === 'm') toggleBGM();
    if (e.key.toLowerCase() === 'r' && gameState === 'gameover') initGame(true);
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function placeBomb() {
    const pc = Math.floor((player.x + player.size / 2) / TILE_SIZE);
    const pr = Math.floor((player.y + player.size / 2) / TILE_SIZE);

    const hasBomb = bombs.some(b => b.x === pc && b.y === pr);
    const myBombs = bombs.filter(b => b.owner === 'player').length;

    if (!hasBomb && myBombs < player.bombsMax) {
        bombs.push({ x: pc, y: pr, timer: 150, range: player.range, owner: 'player', playerOver: true });
        playSE('bomb');
    }
}

function rectIntersect(x1, y1, x2, y2, x3, y3, x4, y4) {
    return x1 < x4 && x2 > x3 && y1 < y4 && y2 > y3;
}

function canMove(x, y, size, pGridX, pGridY, isPlayer = true) {
    const points =[
        { x: x, y: y }, { x: x + size, y: y }, { x: x, y: y + size }, { x: x + size, y: y + size }
    ];

    for (let p of points) {
        const c = Math.floor(p.x / TILE_SIZE);
        const r = Math.floor(p.y / TILE_SIZE);

        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
        if (map[r][c] === 1 || map[r][c] === 2) return false;

        for (let b of bombs) {
            if (b.x === c && b.y === r) {
                if (isPlayer && b.playerOver) continue;
                return false;
            }
        }
    }
    return true;
}

function killPlayer() {
    if (player.alive) {
        player.alive = false;
        gameState = 'gameover';
        playSE('dead');
    }
}

function update() {
    if (gameState === 'stage_clear') return;
    if (gameState !== 'playing') return;

    let dx = 0, dy = 0;
    if (keys['arrowup'] || keys['w']) dy = -player.speed;
    else if (keys['arrowdown'] || keys['s']) dy = player.speed;
    else if (keys['arrowleft'] || keys['a']) dx = -player.speed;
    else if (keys['arrowright'] || keys['d']) dx = player.speed;

    const pGridX = Math.floor((player.x + player.size / 2) / TILE_SIZE);
    const pGridY = Math.floor((player.y + player.size / 2) / TILE_SIZE);

    if (dx !== 0 || dy !== 0) {
        if (canMove(player.x + dx, player.y + dy, player.size, pGridX, pGridY, true)) {
            player.x += dx;
            player.y += dy;
        }
        if (dx !== 0) {
            const targetY = Math.floor((player.y + player.size / 2) / TILE_SIZE) * TILE_SIZE + (TILE_SIZE - player.size) / 2;
            if (Math.abs(player.y - targetY) < 16) player.y += Math.sign(targetY - player.y) * 2;
        }
        if (dy !== 0) {
            const targetX = Math.floor((player.x + player.size / 2) / TILE_SIZE) * TILE_SIZE + (TILE_SIZE - player.size) / 2;
            if (Math.abs(player.x - targetX) < 16) player.x += Math.sign(targetX - player.x) * 2;
        }
    }

    // アイテムの更新と取得
    for (let i = items.length - 1; i >= 0; i--) {
        if (items[i].safeTimer > 0) items[i].safeTimer--; // 無敵時間を減らす

        if (pGridX === items[i].x && pGridY === items[i].y) {
            if (items[i].type === 'fire') player.range++;
            else if (items[i].type === 'bomb') player.bombsMax++;
            else if (items[i].type === 'speed' && player.speedLevel < 5) {
                player.speed += 0.3;
                player.speedLevel++;
            }
            score += 50;
            playSE('item');
            items.splice(i, 1);
        }
    }

    if (hatch.revealed && enemies.length === 0) {
        if (pGridX === hatch.c && pGridY === hatch.r) {
            const hx = hatch.c * TILE_SIZE + TILE_SIZE / 2;
            const hy = hatch.r * TILE_SIZE + TILE_SIZE / 2;
            const px = player.x + player.size / 2;
            const py = player.y + player.size / 2;
            if (Math.hypot(px - hx, py - hy) < 12) {
                gameState = 'stage_clear';
                playSE('clear');
                setTimeout(() => {
                    stage++;
                    initGame(false); 
                }, 3000);
            }
        }
    }

    for (let i = bombs.length - 1; i >= 0; i--) {
        let b = bombs[i];
        b.timer--;

        if (b.playerOver) {
            const bx1 = b.x * TILE_SIZE, by1 = b.y * TILE_SIZE;
            const bx2 = bx1 + TILE_SIZE, by2 = by1 + TILE_SIZE;
            if (!rectIntersect(player.x, player.y, player.x + player.size, player.y + player.size, bx1, by1, bx2, by2)) {
                b.playerOver = false;
            }
        }

        if (b.timer <= 0) {
            explode(b);
            bombs.splice(i, 1);
        }
    }

    let explodedThisFrame = false;
    for (let i = explosions.length - 1; i >= 0; i--) {
        let exp = explosions[i];
        exp.timer--;

        if (exp.timer === 24 && !explodedThisFrame) {
            playSE('explode');
            explodedThisFrame = true;
        }

        const ex1 = exp.x * TILE_SIZE, ey1 = exp.y * TILE_SIZE;
        const ex2 = ex1 + TILE_SIZE,   ey2 = ey1 + TILE_SIZE;

        const margin = 6;
        if (rectIntersect(player.x + margin, player.y + margin, player.x + player.size - margin, player.y + player.size - margin, ex1, ey1, ex2, ey2)) {
            killPlayer();
        }

        for (let j = enemies.length - 1; j >= 0; j--) {
            let en = enemies[j];
            if (rectIntersect(en.x + 4, en.y + 4, en.x + en.size - 4, en.y + en.size - 4, ex1, ey1, ex2, ey2)) {
                enemies.splice(j, 1);
                score += 100;
                playSE('enemy');
            }
        }

        // 【修正】無敵時間を過ぎたアイテムだけ爆風で消滅する
        for (let k = items.length - 1; k >= 0; k--) {
            if (items[k].x === exp.x && items[k].y === exp.y && items[k].safeTimer <= 0) {
                items.splice(k, 1);
            }
        }

        if (exp.timer <= 0) explosions.splice(i, 1);
    }

    enemies.forEach(en => {
        let edx = 0, edy = 0;
        if (en.dir === 0) edy = -en.speed;
        else if (en.dir === 1) edy = en.speed;
        else if (en.dir === 2) edx = -en.speed;
        else if (en.dir === 3) edx = en.speed;

        en.changeDirTimer--;

        const egX = Math.floor((en.x + en.size / 2) / TILE_SIZE);
        const egY = Math.floor((en.y + en.size / 2) / TILE_SIZE);

        if (canMove(en.x + edx, en.y + edy, en.size, egX, egY, false) && en.changeDirTimer > 0) {
            en.x += edx;
            en.y += edy;
            if (edx !== 0) en.y += Math.sign((Math.floor((en.y + en.size / 2) / TILE_SIZE) * TILE_SIZE + (TILE_SIZE - en.size) / 2) - en.y) * 1;
            if (edy !== 0) en.x += Math.sign((Math.floor((en.x + en.size / 2) / TILE_SIZE) * TILE_SIZE + (TILE_SIZE - en.size) / 2) - en.x) * 1;
        } else {
            en.x = Math.floor((en.x + en.size / 2) / TILE_SIZE) * TILE_SIZE + (TILE_SIZE - en.size) / 2;
            en.y = Math.floor((en.y + en.size / 2) / TILE_SIZE) * TILE_SIZE + (TILE_SIZE - en.size) / 2;
            en.dir = Math.floor(Math.random() * 4);
            en.changeDirTimer = Math.floor(Math.random() * 90) + 45;
        }

        if (player.alive) {
            const dist = Math.hypot((player.x + player.size/2) - (en.x + en.size/2), (player.y + player.size/2) - (en.y + en.size/2));
            if (dist < 22) killPlayer();
        }
    });
}

function explode(bomb) {
    explosions.push({ x: bomb.x, y: bomb.y, timer: 25 });

    const straightDirs =[{x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}];
    straightDirs.forEach(d => {
        for (let i = 1; i <= bomb.range; i++) {
            const tx = bomb.x + d.x * i;
            const ty = bomb.y + d.y * i;

            if (ty < 0 || ty >= ROWS || tx < 0 || tx >= COLS) break;
            if (map[ty][tx] === 1) break;

            explosions.push({ x: tx, y: ty, timer: 25 });

            if (map[ty][tx] === 2) {
                map[ty][tx] = 0;
                score += 10;
                
                let foundHidden = hiddenItems.find(hi => hi.r === ty && hi.c === tx);

                if (hatch.r === ty && hatch.c === tx) {
                    hatch.revealed = true;
                } else if (foundHidden) {
                    // 出現直後にすぐ燃えないようにセーフタイマー(30フレーム)を付与
                    items.push({ x: tx, y: ty, type: foundHidden.type, safeTimer: 30 });
                } else {
                    if (Math.random() < 0.2) {
                        const r = Math.random();
                        let type = 'fire';
                        if (r < 0.33) type = 'bomb';
                        else if (r < 0.66) type = 'speed';
                        items.push({ x: tx, y: ty, type: type, safeTimer: 30 });
                    }
                }
                break;
            }

            const otherBomb = bombs.find(b => b.x === tx && b.y === ty);
            if (otherBomb && otherBomb.timer > 4) otherBomb.timer = 4;
        }
    });
}

function drawHardBlock(c, r) {
    const x = c * TILE_SIZE, y = r * TILE_SIZE;
    let grad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
    grad.addColorStop(0, '#475569');
    grad.addColorStop(1, '#1e293b');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
}

function drawSoftBlock(c, r) {
    const x = c * TILE_SIZE, y = r * TILE_SIZE;
    let grad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
    grad.addColorStop(0, '#ea580c');
    grad.addColorStop(1, '#7c2d12');
    ctx.fillStyle = grad;
    ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);

    ctx.strokeStyle = '#431407';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
    ctx.beginPath();
    ctx.moveTo(x + 2, y + TILE_SIZE / 2); ctx.lineTo(x + TILE_SIZE - 2, y + TILE_SIZE / 2);
    ctx.moveTo(x + TILE_SIZE / 2, y + 2); ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE - 2);
    ctx.stroke();
}

function drawHatch() {
    if (!hatch.revealed) return;
    const x = hatch.c * TILE_SIZE, y = hatch.r * TILE_SIZE;
    
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
    ctx.strokeStyle = '#9ca3af';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
    
    ctx.fillStyle = enemies.length === 0 ? '#10b981' : '#ef4444';
    ctx.fillRect(x + 12, y + 12, TILE_SIZE - 24, TILE_SIZE - 24);
}

function drawBomb(b) {
    const cx = b.x * TILE_SIZE + TILE_SIZE / 2;
    const cy = b.y * TILE_SIZE + TILE_SIZE / 2;

    const pulse = 1 + Math.sin(b.timer * 0.2) * 0.06;
    const radius = (TILE_SIZE / 2 - 5) * pulse;

    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - radius);
    ctx.quadraticCurveTo(cx + 12, cy - radius - 12, cx + 14, cy - radius - 6);
    ctx.stroke();

    ctx.fillStyle = Math.random() > 0.5 ? '#f59e0b' : '#ef4444';
    ctx.beginPath();
    ctx.arc(cx + 14, cy - radius - 6, 3 + Math.random() * 4, 0, Math.PI * 2);
    ctx.fill();

    let grad = ctx.createRadialGradient(cx - radius/3, cy - radius/3, 2, cx, cy, radius);
    if (Math.sin(b.timer * 0.2) > 0.4) {
        grad.addColorStop(0, '#fca5a5');
        grad.addColorStop(0.5, '#dc2626');
        grad.addColorStop(1, '#7f1d1d');
    } else {
        grad.addColorStop(0, '#4b5563');
        grad.addColorStop(0.5, '#1f2937');
        grad.addColorStop(1, '#0f172a');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
}

function drawExplosion(exp) {
    const x = exp.x * TILE_SIZE, y = exp.y * TILE_SIZE;
    const cx = x + TILE_SIZE / 2, cy = y + TILE_SIZE / 2;

    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    let grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, TILE_SIZE / 2);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.2, '#fde047');
    grad.addColorStop(0.6, '#f97316');
    grad.addColorStop(0.9, '#ef4444');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.fillStyle = grad;
    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
    ctx.restore();
}

function drawItem(it) {
    const cx = it.x * TILE_SIZE + TILE_SIZE / 2;
    const cy = it.y * TILE_SIZE + TILE_SIZE / 2;

    // 無敵時間中は少し点滅させる
    if (it.safeTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;

    ctx.fillStyle = '#1e1b4b';
    ctx.strokeStyle = '#6366f1';
    ctx.lineWidth = 2;
    ctx.fillRect(cx - 16, cy - 16, 32, 32);
    ctx.strokeRect(cx - 16, cy - 16, 32, 32);

    if (it.type === 'fire') {
        ctx.fillStyle = '#f97316';
        ctx.beginPath();
        ctx.moveTo(cx, cy - 10);
        ctx.quadraticCurveTo(cx + 8, cy, cx + 4, cy + 10);
        ctx.lineTo(cx - 4, cy + 10);
        ctx.quadraticCurveTo(cx - 8, cy, cx, cy - 10);
        ctx.fill();
    } else if (it.type === 'bomb') {
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath();
        ctx.arc(cx, cy + 2, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy - 5); ctx.lineTo(cx + 4, cy - 9);
        ctx.stroke();
    } else if (it.type === 'speed') {
        ctx.fillStyle = '#fde047';
        ctx.beginPath();
        ctx.moveTo(cx + 2, cy - 10);
        ctx.lineTo(cx - 6, cy + 2);
        ctx.lineTo(cx + 2, cy + 2);
        ctx.lineTo(cx - 2, cy + 12);
        ctx.lineTo(cx + 6, cy - 2);
        ctx.lineTo(cx - 2, cy - 2);
        ctx.fill();
    }
}

function drawPlayer() {
    if (!player.alive) return;
    const cx = player.x + player.size / 2;
    const cy = player.y + player.size / 2;

    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowOffsetY = 4;

    ctx.fillStyle = '#2563eb';
    ctx.beginPath(); ctx.arc(cx, cy + 5, 12, 0, Math.PI * 2); ctx.fill();

    let headGrad = ctx.createRadialGradient(cx - 3, cy - 7, 2, cx, cy - 5, 13);
    headGrad.addColorStop(0, '#ffffff');
    headGrad.addColorStop(1, '#cbd5e1');
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.arc(cx, cy - 5, 14, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#ffedd5';
    ctx.beginPath(); ctx.ellipse(cx, cy - 5, 10, 7, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#0f172a';
    ctx.fillRect(cx - 5, cy - 8, 2, 6);
    ctx.fillRect(cx + 3, cy - 8, 2, 6);

    ctx.fillStyle = '#f43f5e';
    ctx.beginPath(); ctx.arc(cx, cy - 22, 4, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
}

function drawEnemies() {
    enemies.forEach(en => {
        const cx = en.x + en.size / 2;
        const cy = en.y + en.size / 2;

        let grad = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, en.size / 2);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.4, en.color);
        grad.addColorStop(1, '#000000');

        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(cx, cy, en.size / 2, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx - 5, cy - 2, 3, 0, Math.PI * 2);
        ctx.arc(cx + 5, cy - 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(cx - 5, cy - 2, 1, 0, Math.PI * 2);
        ctx.arc(cx + 5, cy - 2, 1, 0, Math.PI * 2);
        ctx.fill();
    });
}

function render() {
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(51, 65, 85, 0.25)';
    ctx.lineWidth = 1;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (map[r][c] === 1) drawHardBlock(c, r);
            else if (map[r][c] === 2) drawSoftBlock(c, r);
            else ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    drawHatch();
    items.forEach(drawItem);
    bombs.forEach(drawBomb);
    explosions.forEach(drawExplosion);
    drawEnemies();
    drawPlayer();

    document.getElementById('stage-ui').textContent = stage;
    document.getElementById('score').textContent = score;
    const currentPlaced = bombs.filter(b => b.owner === 'player').length;
    document.getElementById('bombs-ui').textContent = `${player.bombsMax - currentPlaced}/${player.bombsMax}`;
    document.getElementById('fire-ui').textContent = player.range;
    document.getElementById('speed-ui').textContent = player.speedLevel;

    if (gameState === 'gameover' || gameState === 'stage_clear') {
        ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.font = 'bold 50px sans-serif';
        if (gameState === 'gameover') {
            ctx.fillStyle = '#ef4444';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = '#ffffff';
            ctx.font = '20px sans-serif';
            ctx.fillText('Press [ R ] to Restart', canvas.width / 2, canvas.height / 2 + 40);
        } else {
            ctx.fillStyle = '#10b981';
            ctx.fillText('STAGE CLEAR!', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = '#ffffff';
            ctx.font = '20px sans-serif';
            ctx.fillText('Next stage is loading...', canvas.width / 2, canvas.height / 2 + 40);
        }
    }
}

function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    const elapsed = timestamp - lastTime;
    if (elapsed > fpsInterval) {
        lastTime = timestamp - (elapsed % fpsInterval);
        update();
        render();
    }
}

window.onload = () => {
    initGame();
    requestAnimationFrame((timestamp) => {
        lastTime = timestamp;
        gameLoop(timestamp);
    });
};
</script>
</body>
